<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfpack - Generador de Misiones</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #262626;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #af3a3a;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .campo {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }
        .campo span {
            font-weight: bold;
        }
        .valor {
            background-color: #111;
            padding: 5px 10px;
            border-radius: 4px;
            min-width: 50px;
            text-align: center;
            border: 1px solid #444;
        }
        .btn-generar {
            width: 100%;
            background-color: #af3a3a;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-generar:hover {
            background-color: #d14545;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BBD - Generador de Misiones</h2>
    
    <div class="campo">
        <span>Cambio de dirección del convoy:</span>
        <div id="ui-cambio" class="valor">-</div>
    </div>
    
    <div class="campo">
        <span>Sonares Activos:</span>
        <div id="ui-sonares" class="valor">-</div>
    </div>
    
    <button class="btn-generar" onclick="ejecutarGeneracion()">Generar Misión</button>
</div>

<script src="utilidades.js"></script>
<script src="generador.js"></script>

</body>
</html>
