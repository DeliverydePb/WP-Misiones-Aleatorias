<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfpack - Generador de Misiones</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #262626;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #af3a3a;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .campo {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }
        .campo span {
            font-weight: bold;
        }
        .valor {
            background-color: #111;
            padding: 5px 10px;
            border-radius: 4px;
            min-width: 50px;
            text-align: center;
            border: 1px solid #444;
        }
        .btn-generar {
            width: 100%;
            background-color: #af3a3a;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .btn-generar:hover {
            background-color: #d14545;
        }
		
		#bg-video {
		position: fixed;
		top: 50%;
		left: 50%;
		min-width: 100%;
		min-height: 100%;
		width: auto;
		height: auto;
		z-index: -2; /* Se posiciona detrás del contenedor principal */
		transform: translate(-50%, -50%);
		object-fit: cover;
		opacity: 0.25; /* Bajamos la opacidad para que no moleste la lectura del panel */
		}
	
		#contenedor-volumen {
			position: fixed;
			top: 20px;
			right: 20px;
			background-color: rgba(38, 38, 38, 0.85);
			border: 1px solid #444;
			padding: 6px 12px;
			display: flex;
			align-items: center;
			gap: 8px;
			border-radius: 4px;
			z-index: 10;
		}

		#control-volumen {
			accent-color: #af3a3a; /* Usa el mismo color rojo de tus botones */
			cursor: pointer;
			width: 80px;
			vertical-align: middle;
		}
		
		
    </style>
</head>
<body>

<video id="bg-video" autoplay loop muted playsinline>
    <source src="Stahlhaie.mp4" type="video/mp4">
</video>

<div id="contenedor-volumen">
    <span id="icono-volumen">🔈</span>
    <input type="range" id="control-volumen" min="0" max="1" step="0.05" value="0" oninput="ajustarVolumen(this.value)">
</div><div id="contenedor-volumen">
    <span id="icono-volumen">🔈</span>
    <input type="range" id="control-volumen" min="0" max="1" step="0.05" value="0" oninput="ajustarVolumen(this.value)">
</div>

<div class="container">
    <h2>24 Flotilla 'Geweih'<br>Generador de Misiones</h2>

    <button class="btn-generar" onclick="ejecutarGeneracion()">Generar Misión</button> 
 
    <div class="campo">
        <span>Cambio de dirección del convoy:</span>
        <div id="ui-cambio" class="valor">-</div>
    </div>
    
    <div class="campo">
        <span>Sonares Activos:</span>
        <div id="ui-sonares" class="valor">-</div>
    </div>
 
</div>

<script src="utilidades.js"></script>
<script src="generador.js"></script>

</body>
</html>
